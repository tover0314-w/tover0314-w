<svg width="1280" height="420" viewBox="0 0 1280 420" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">tover wu profile banner</title>
  <desc id="desc">A dark developer profile banner for an AI product builder focused on voice interfaces and solo building.</desc>
